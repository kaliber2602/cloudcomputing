upstream web_frontend_cluster {
    server web-frontend-server1:80;
    server web-frontend-server2:80;
}

server {
    listen 80;
    server_name localhost;

    # Tắt cache để test load balancing
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    if_modified_since off;
    expires off;
    etag off;

    # Cấu hình để tăng timeout và buffer size, hữu ích cho các request lớn
    proxy_connect_timeout 60s;
    proxy_send_timeout   60s;
    proxy_read_timeout   60s;
    proxy_buffers 8 16k;
    proxy_buffer_size 32k;

    # Location block cho API backend
    # Tất cả request bắt đầu bằng /api/ sẽ được chuyển đến application-backend-server
    location /api/ {
        # Dấu / ở cuối proxy_pass rất quan trọng.
        # Nó sẽ loại bỏ /api/ từ URL gốc trước khi gửi đi.
        # Ví dụ: /api/students-db -> http://application-backend-server:8081/students-db
        proxy_pass http://application-backend-server:8081/;
        
        # Các header cần thiết để giữ lại thông tin request gốc
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /student-json {
        # Rewrite URL nội bộ từ /student-json thành /student_json.html
        rewrite ^/student-json$ /student_json.html last;
    }

    location = /database {
        # Rewrite URL nội bộ từ /database thành /database.html
        rewrite ^/database$ /database.html last;
    }

    location /student/ {
        proxy_pass http://application-backend-server:8081/student;
    }   

    # Location block cho Keycloak Authentication
    location /auth/ {
        proxy_pass http://authentication-identity-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
        
        # Cho phép Keycloak biết đây là một proxy an toàn
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Location block cho web frontend
    # Tất cả các request khác sẽ được chuyển đến web-frontend-server
    location / {
        proxy_pass http://web-frontend-server:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Location block cho Load Balancer Test
    # Truy cập http://localhost/load-balancer/ để kiểm tra Round Robin
    location /load-balancer/ {
        proxy_pass http://web_frontend_cluster/; # Dấu / ở cuối để map /load-balancer/ -> /
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}